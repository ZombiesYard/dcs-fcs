# AH-64D external yaw FBW / auto rudder defaults
dcs_bios_path=C:\Users\15423\Saved Games\DCS\Scripts\DCS-BIOS
multicast_address=239.255.50.10
multicast_interface=127.0.0.1
udp_port=5010

# dcs_bios = existing DCS-BIOS export, usually ~30 Hz
# fast_export = optional high-rate Lua export in lua/ah64d_auto_rudder_export.lua
telemetry_source=fast_export
fast_export_bind_address=127.0.0.1
fast_export_port=34380

# UCR/T300 pedals -> vJoy #1 -> this app -> vJoy #2 -> DCS
input_vjoy_id=1
output_vjoy_id=2
input_device_name_contains=1CBB0530-691E-11F1-8003-444553540000
axis_name=X
rudder_input_center=0.0
rudder_input_deadzone=0.03
rudder_input_scale=1.0

# External yaw FBW tuning. heading_hold treats the pedal as yaw-rate intent:
# centered pedal holds current heading, pedal deflection commands a turn.
control_mode=heading_hold
assist_sign=-1
yaw_response_sign=1
yaw_rate_sign=-1
yaw_rate_source=heading
kp=1.20
ki=0.00
integral_limit=0.00
max_assist=1.00
heading_hold_max_assist=0.70
release_brake_time=0.55
release_brake_kp=1.80
release_brake_max_assist=0.80
yaw_rate_deadband=0.018
yaw_rate_error_exponent=0.90
yaw_rate_integral_gain=0.14
yaw_rate_integral_limit=0.12
yaw_rate_integral_leak=0.35
yaw_rate_integral_deadband=0.012
yaw_accel_gain=0.07
yaw_accel_filter_time=0.060
yaw_accel_limit=0.10
heading_error_deadband=0.015
heading_error_relock_threshold=0.50
heading_hold_leak_time=0.00
heading_kp=0.40
heading_rate_limit=0.22
turn_rate_max=0.45
pedal_command_sign=1
pedal_command_deadzone=0.06
pedal_command_exit_deadzone=0.03
pedal_override_threshold=0.12
pedal_rate_override_threshold=1.0
trim_capture_enabled=0
trim_capture_min_pedal=0.20
trim_capture_yaw_rate=0.025
trim_capture_pedal_rate=0.50
# Prevent DCS trim from capturing automatic rudder assist.
# Recommended robust setup:
# 1. Hold your physical trim button and run --list-devices to find its button number.
# 2. Set trim_guard_enabled=1 and trim_guard_input_button to that number.
# 3. Bind AH-64D force trim in DCS to vJoy #2 trim_guard_output_button, not the physical button.
trim_guard_enabled=0
trim_guard_input_id=4
trim_guard_input_device_name_contains=Joystick - HOTAS Warthog
trim_guard_input_button=7
trim_guard_output_button=1
trim_guard_pre_time=0.08
trim_guard_press_time=0.08
trim_guard_post_time=0.35
# Controls what feeds the existing collective_* disturbance compensator.
# collective = old behavior; fuel_flow/fuel_rpm = engine power proxy from fast export.
power_feedforward_source=fuel_rpm
fuel_flow_min=0.055
fuel_flow_max=0.155
rpm_nominal=100.0
rpm_drop_full_scale=8.0
rpm_power_gain=0.40
# auto = use fast_export collective if available; otherwise use configured fallback
# xinput = Xbox controller via XInput; axis names: LX, LY, RX, RY, LT, RT
# directinput = force the configured DirectInput device/axis as collective
collective_source=directinput
collective_input_id=1
collective_device_name_contains=Throttle
collective_axis_name=RZ
collective_invert=0
collective_sign=-1
collective_feedforward_mode=power
collective_gain=0.90
collective_zero_thrust=0.00
collective_power_exponent=1.50
collective_rate_gain=0.12
collective_rate_limit=0.08
collective_transient_rate_threshold=0.18
collective_rate_hold_time=0.00
collective_rate_reverse_threshold=0.12
collective_rate_reverse_slew_time=0.25
collective_transient_fade_time=0.070
collective_output_axis_name=Z
collective_output_invert=0
auto_tune_collective_drive=0
auto_tune_collective_amplitude=0.05
auto_tune_collective_period=4.00
auto_tune_collective_settle_time=6.00
auto_tune_collective_rate_limit=0.40
fade_in_time=0.075
fade_out_time=0.110
filter_time=0.040
stale_timeout=1.00
loop_hz=100

# F-14 high-AoA roll-to-rudder assist. Enable with:
# control_mode=f14_roll_assist
# DCS should bind F-14 roll/rudder only to output_vjoy_id axes below.
f14_roll_axis_name=X
f14_rudder_axis_name=X
# Roll and rudder can come from different DirectInput devices.
# id=0/filter empty falls back to input_vjoy_id/input_device_name_contains.
f14_roll_input_id=1
f14_roll_device_name_contains=Joystick - HOTAS Warthog
f14_rudder_input_id=1
f14_rudder_device_name_contains=vJoy
f14_output_roll_axis_name=X
f14_output_rudder_axis_name=RZ
# Converts raw LoGetAngleOfAttack() to approximate F-14 AoA units.
# Current DCS/F-14 logs show this value behaves like degrees, so 1.5 means
# roughly 1.5 cockpit AoA units per exported degree. If your export is radians,
# use 85.9436692696 instead.
f14_aoa_units_offset=0
f14_aoa_units_per_radian=1.5
f14_aoa_onset_units=12.5
f14_aoa_full_units=16.5
f14_deep_aoa_onset_units=19.0
f14_deep_aoa_full_units=23.0
f14_roll_deadzone=0.03
f14_roll_washout=0.55
f14_deep_roll_washout=0.10
f14_roll_min_scale=0.35
f14_roll_to_rudder_gain=0.65
f14_deep_roll_to_rudder_gain=0.20
f14_low_aoa_roll_coordination_gain=0.04
f14_roll_to_rudder_sign=1
f14_yaw_rate_gain=0.08
f14_yaw_rate_sign=1
f14_slip_gain=0.0
f14_slip_sign=1
f14_beta_limit=0.35
f14_beta_limiter_gain=0.30
f14_rudder_max_assist=0.65
f14_rudder_rate_limit=2.0
f14_ground_ias_threshold=35.0
f14_ground_agl_threshold=3.0
f14_landing_gear_threshold=0.50
f14_landing_flaps_threshold=0.50
f14_roll_rate_sign=1
f14_reversal_guard_time=0.15
f14_reversal_roll_threshold=0.30
f14_reversal_roll_rate_threshold=0.10
f14_reversal_guard_scale=0.35

hotkey=PAUSE
log_path=auto_rudder.log
calibration_max_assist=0.08
